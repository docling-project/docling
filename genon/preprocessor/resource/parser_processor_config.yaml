ocr:
  ocr_mode: "auto" # "auto"(default), "force", "disable"

  # OCR 엔진 선택. "paddle"(default) | "upstage"
  # docker image 재빌드 없이 yaml 만으로 전환 가능
  engine: "paddle"

  # engine: "paddle" 일 때만 사용
  # <OCR_ENDPOINT>: PaddleOCR 서버 주소로 변경 필요
  ocr_endpoint: "http://<OCR_ENDPOINT>/ocr"

  # engine: "upstage" 일 때만 사용
  upstage:
    api_endpoint: "https://api.upstage.ai/v1/document-digitization"
    # api_key 가 비어있으면 UPSTAGE_API_KEY 환경변수에서 fallback (시크릿 운영용)
    api_key: ""
    model: "ocr"
    timeout: 60
    text_score: 0.5

layout:
  layout_model_type: "genos_layout" # "genos_layout"(default) or "docling_layout"
  genos_layout:
    # <LAYOUT_SERVING_ID>: Genos에 등록한 layout 모델서빙 ID로 변경 필요
    # api_key는 k8s 내부 통신 기반 모델 호출 시 불필요.
    endpoint: "http://llmops-gateway-api-service:8080/rep/serving/<LAYOUT_SERVING_ID>/v1/chat/completions"
    api_key: ""
    page_batch_size: 32

enrichment:
  do_toc: true
  do_metadata: true

  # <ENRICHMENT_SERVING_ID>: Genos에 등록한 enrichment 모델서빙 ID로 변경 필요
  # api_key는 k8s 내부 통신 기반 모델 호출 시 불필요.
  api_url: "http://llmops-gateway-api-service:8080/rep/serving/<ENRICHMENT_SERVING_ID>/v1/chat/completions"
  api_key: ""
  model: "model"
  precheck:
    enabled: false
    # 입력+출력 전체 context limit
    max_context_tokens: 128000
    # completion 영역으로 예약할 토큰 수 (max_context - reserved 를 prompt 허용치로 사용)
    completion_reserved_tokens: 12000
  toc:
    temperature: 0.0
    top_p: 0.00001
    seed: 33
    max_tokens: 10000

  # facade 후처리 기반 이미지 설명 생성 (문맥 포함)
  image_description:
    enabled: false
    # 필요 시만 지정 (미지정 시 enrichment.api_url 상속)
    api_url: ""
    # 필요 시만 지정 (미지정 시 enrichment.api_key 상속)
    api_key: ""
    # 필요 시만 지정 (미지정 시 enrichment.model 상속)
    model: "model"
    before_items: 3
    after_items: 2
    max_context_chars: 1500
    prompt_template: |
      문서의 일부 이미지를 설명해줘. 아래 문맥을 참고해서 핵심 정보를 2~4문장으로 간결하게 작성해줘.

      [앞 문맥]
      {before_context}

      [캡션]
      {caption}

      [뒤 문맥]
      {after_context}

      요구사항:
      1) 추측은 최소화하고 이미지에서 확인 가능한 사실 중심으로 작성
      2) 문서 문맥과의 연결점을 포함
      3) 한국어로 작성

output:
  format: "json" # "json" (default), "html", "markdown"
  table_format: "html" # "html" (default), "markdown"

# whisper 설정, 음성인식 모델이 필요한 경우 설정.
whisper:
  url: ""
  model: "model"
  language: "ko"
  response_format: "json"
  temperature: "0"
  stream: "false"
  timestamp_granularities: "word"
  chunk_sec: 29
