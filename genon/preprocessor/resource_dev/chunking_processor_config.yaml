# 청킹 전용 전처리기(Chunk API, /chunker) 설정 — 모니모 GenOS Temporal 파이프라인 #284
#
# 이 facade(chunking_processor.py)는 파싱(docling) 결과를 입력으로 받아 청킹만 수행한다.
# 파싱/로딩/OCR/레이아웃/enrichment 는 앞단계(파싱 Activity)에서 이미 끝났으므로
# 여기서는 호출되지 않는다. 따라서 ocr/layout/pdf_pipeline/enrichment 섹션은 두지 않으며,
# 미설정 시 코드 기본값으로 안전하게 폴백된다.

defaults:
  # 5=DEBUG, 4=INFO, 3=WARNING, 2=ERROR, 1=CRITICAL, 0=NOLOG
  log_level: 4

# 청킹(GenosSmartChunker) 설정
chunking:
  # 청크 최대 크기(max_tokens). char 모드면 "최대 문자 수", huggingface 모드면 "최대 토큰 수".
  # 우선순위: 호출 kwargs 의 chunk_size > 아래 chunk_size. 0 = 토큰/문자 기반 분할 안 함.
  chunk_size: 0
  # 토큰 수 계산 방식. "char"(default)=문자 수 기준 | "huggingface"=HF 토크나이저 기준
  tokenizer_type: "char"
  # 청킹용 토크나이저(huggingface 모드에서만 사용). tokenizer_path 가 실제 존재하면 그 경로,
  # 없으면 tokenizer_id(HF) 로 폴백 (외부 네트워크 차단 환경 대비)
  tokenizer_path: "/models/doc_parser_models/sentence-transformers-all-MiniLM-L6-v2"
  tokenizer_id: "sentence-transformers/all-MiniLM-L6-v2"

  # parse-format(비-docling) 입력의 일반 텍스트 splitter 기본값.
  # 파서가 docling 을 못 만드는 포맷(csv/xlsx/txt/md/ppt/pptx/doc/이미지/오디오)은 parse-format
  # ({"elements":[...]})으로 들어오며, 그 중 일반 텍스트는 RecursiveCharacterTextSplitter 로
  # 분할한다. docling 경로(GenosSmartChunker, 위 chunk_size)와는 무관하며,
  # audio([AUDIO])/csv·xlsx([DA]) 단일 벡터에는 적용되지 않는다.
  # 우선순위: 호출 kwargs(chunk_size/generic_chunk_size, chunk_overlap/generic_chunk_overlap)
  #           > 아래 값 > 코드 기본값(1000/100).
  generic:
    chunk_size: 1000     # 0 이하면 1000 으로 폴백
    chunk_overlap: 100   # 음수면 100 으로 폴백

# table_image
# 표를 이미지로 잘라 저장하고 media_files 에 type='table_image' 로 기록할지 여부.
# 청킹 단계에서는 입력 docling 문서에 이미 들어있는 이미지/표 참조를 활용한다.
table_image:
  enable: false

# 표 텍스트 직렬화 옵션(markdown 표 표현). export_to_html=0(markdown) 경로에만 적용.
output:
  compact_tables: true    # markdown 표 컬럼 정렬 패딩 제거(대형 표 청크 축소). html 포맷엔 무관.
