defaults:
  # 5=DEBUG, 4=INFO, 3=WARNING, 2=ERROR, 1=CRITICAL, 0=NOLOG
  log_level: 4

ocr:
  ocr_mode: "auto" # "auto"(default), "force", "disable"

  # OCR 엔진 선택. "paddle"(default) | "upstage"
  # docker image 재빌드 없이 yaml 만으로 전환 가능
  engine: "paddle"

  # 글리프 깨진 테이블 셀 재OCR 시 HTTP timeout(초). 기본 60
  table_cell_ocr_timeout: 60

  # engine: "paddle" 일 때만 사용. text_score 미지정 시 0.3 기본
  paddle:
    # <OCR_ENDPOINT>: PaddleOCR 서버 주소로 변경 필요
    ocr_endpoint: "http://192.168.73.172:48080/ocr"
    text_score: 0.3

  # 글리프 깨짐 기반 auto-OCR 재트리거 임계값
  # table_cell_threshold: 셀 텍스트에 GLYPH 토큰이 N개 이상이면 재OCR(>= 비교, 기본 1)
  # document_threshold: 문서 텍스트 아이템 GLYPH 토큰이 N개 초과면 OCR 경로 재시도(> 비교, 기본 10)
  glyph_detection:
    table_cell_threshold: 1
    document_threshold: 10

  # engine: "upstage" 일 때만 사용
  upstage:
    api_endpoint: "https://api.upstage.ai/v1/document-digitization"
    # api_key 가 비어있으면 UPSTAGE_API_KEY 환경변수에서 fallback (시크릿 운영용)
    api_key: ""
    model: "ocr"
    timeout: 60
    text_score: 0.5

layout:
  layout_model_type: "genos_layout" # "genos_layout"(default) or "docling_layout"
  genos_layout:
    endpoint: "http://192.168.75.174:26001/v1/chat/completions"
    api_key: ""
    page_batch_size: 128
    max_completion_tokens: 16384
    model: "dots-mocr"          # 서빙 모델명
    timeout: 3600               # VLM 요청 타임아웃(초)
    retry_count: 2              # 비정상 VLM 응답 재시도 횟수
    temperature: 0.1            # 생성 temperature
    top_p: 0.9                  # 생성 top_p (0<top_p<=1)
    repetition_penalty: 1.15    # >1.0, 토큰 반복(degeneration) 억제

# ── PDF 파이프라인 ─────────────────────────────────────────────────────────────
# docling PDF 파싱 성능/품질 노브. 키 생략 시 아래 기본값과 동일하게 동작.
pdf_pipeline:
  num_threads: 8                     # accelerator 스레드 수 (호스트 CPU에 맞게 조정)
  device: "auto"                     # "auto"(default) | "cpu" | "cuda" | "mps"
  images_scale: 2                    # 페이지/그림 이미지 렌더 배율 (품질↔메모리)
  generate_page_images: true         # false 로 두면 메모리 절감
  generate_picture_images: true      # false 로 두면 이미지 설명 enrichment 가 비활성화됨
  table_structure_mode: "accurate"   # "accurate"(default, 품질) | "fast"(속도)

# ── enrichment ────────────────────────────────────────────────────────────────
# 각 항목은 {이름: {옵션}} 형식의 list.
# 비활성화 방법: ① 항목 삭제  ② 항목 주석 처리  ③ enable: false 추가 (설정 보존)
enrichment:
  - toc:
      enable: true
      url: "https://genos.genon.ai/api/gateway/rep/serving/752/v1/chat/completions"
      api_key: "d1a9e0acab6243019008a96cd8af868e"
      model: "model"
      temperature: 0.0
      top_p: 0.00001
      seed: 33
      max_tokens: 10000
      precheck:
        enabled: true
        max_context_tokens: 128000
        completion_reserved_tokens: 12000
      # 반복(degeneration) 억제. 미설정 시 미전송.
      repetition_penalty: 1.1
      # thinking(추론) 모드. 미설정 시 기본 off(차단 토큰 전송). 모델 자동 판단은 thinking: auto.
      # thinking: off | on | auto,  thinking_dialect: standard(enable_thinking) | hcx(force/skip_reasoning)
      # thinking: off
      # thinking_dialect: standard
      system_prompt_file: prompt_toc_default_system.md
      user_prompt_file: prompt_toc_default_user.md
      # 긴 문서 분할 TOC 추출(carry-over refine). enabled=true 면 길이와 무관하게 항상 분할 수행.
      # 분할 각 청크에도 위 system/user 프롬프트를 사용하며, 2번째 청크부터 누적 목차를 컨텍스트로 덧붙인다.
      split:
        enabled: false
        pages_per_chunk: 100          # 청크당 페이지 수
        page_overlap: 1             # 청크 경계 중복 페이지 수
        carryover_max_tokens: 1500  # 다음 청크에 주입할 누적 목차 토큰 상한

  - metadata:
      enable: true
      url: "https://genos.genon.ai/api/gateway/rep/serving/752/v1/chat/completions"
      api_key: "d1a9e0acab6243019008a96cd8af868e"
      model: "model"
      max_tokens: 10000
      temperature: 0.0
      timeout: 3600
      pages: [1,4]  # null = 첫 4페이지 (docling 기존 동작과 동일)
      # output_fields: 프롬프트의 JSON 키와 일치해야 함
      output_fields: [created_date, authors]
      parser:
        type: json
        # extract_pattern: '<date>(.*?)</date>'
        # type: python
        # file: authors_parser.py
        # callable: parse
      # thinking(추론) 모드. 미설정 시 기본 off(차단 토큰 전송). 모델 자동 판단은 thinking: auto.
      # thinking: off | on | auto,  thinking_dialect: standard(enable_thinking) | hcx(force/skip_reasoning)
      # thinking: off
      # thinking_dialect: standard
      system_prompt_file: prompt_metadata_default_system.md
      user_prompt_file: prompt_metadata_default_user.md
      precheck:
        enabled: true
        max_context_tokens: 128000
        completion_reserved_tokens: 12000

  - image_description:
      enable: true
      url: "https://genos.genon.ai/api/gateway/rep/serving/752/v1/chat/completions"
      api_key: "d1a9e0acab6243019008a96cd8af868e"
      model: "model"
      # 이미지 설명 요청 병렬 수 (기본 16, 문서 내 이미지가 많을 때 처리속도에 영향)
      concurrency: 16
      before_items: 3
      after_items: 2
      max_context_chars: 1500
      prompt_template_file: prompt_image_description_default.md

  # ── 커스텀 LLM enricher ────────────────────────────────────────────────────
  # 복수 항목 허용: 각각 독립 LLM 호출, 결과는 metadata 병합
  - custom_fields:
      enable: true
      url: "https://genos.genon.ai/api/gateway/rep/serving/752/v1/chat/completions"
      api_key: "d1a9e0acab6243019008a96cd8af868e"
      model: "model"
      max_tokens: 1000
      temperature: 0.0
      timeout: 60
      pages: [1]
      output_fields: [authors]
      parser:
        type: json
      system_prompt_file: prompt_custom_fields_authors_system.md
      user_prompt_file: prompt_custom_fields_authors_user.md

  - custom_fields:
      enable: true
      config_file: custom_field_authors.yaml   # resource_path 자동 = 이 yaml 파일 디렉토리

output:
  format: "json" # "json" (default), "html", "markdown", "docling"
  # "docling": 복원 가능한 DoclingDocument 원본 JSON 을 data.document 로 반환(Chunk API 입력용)
  table_format: "html" # "html" (default), "markdown"  ("docling" 포맷에서는 무시)

# whisper 설정, 음성인식 모델이 필요한 경우 설정.
whisper:
  url: ""
  model: "model"
  language: "ko"
  response_format: "json"
  temperature: "0"
  stream: "false"
  timestamp_granularities: "word"
  chunk_sec: 29
  chunk_overlap_ms: 300  # 청크 간 겹침(ms). 전사 경계 품질 노브. 기본 300

# 엑셀(xlsx/xlsm)·csv 처리 (이슈 #288). 출력은 parse-JSON(시트당 HTML 표) 유지.
xlsx:
  # tabular(기본): openpyxl 로 병합셀 unmerge+forward-fill 후 시트→HTML 표(병합 헤더 보존).
  # docling: docling MsExcel/Csv 백엔드로 DoclingDocument 생성 후 parse-JSON 직렬화.
  processing_mode: "tabular"
  # 헤더 행(0-based). 상단에 병합 제목행이 있으면 1 등으로 조정.
  header_row: 0
  # csv 인코딩. 비우면 chardet 자동감지 후 utf-8 폴백.
  encoding: ""
