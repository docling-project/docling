# attachment_processor 기본 설정
# DocumentProcessor() 무인자 호출 시 이 파일을 우선 로드한다.

defaults:
  # 5=DEBUG, 4=INFO, 3=WARNING, 2=ERROR, 1=CRITICAL, 0=NOLOG
  log_level: 4

  # hwp/docx 분기 기본 청커: "recursive" | "hybrid"
  chunker_type: "recursive"

  # 입력 포맷 자동 PDF 변환 엔진 선택
  use_pdf_sdk: true

  # hwp/hwpx 처리 시 기본 SDK 백엔드 사용 여부
  use_hwp_sdk: true

  # use_hwp_sdk=true 일 때만 유효한 SDK 출력 덤프
  dump_sdk_output: false

  # hwp/hwpx 처리 시 이미지 저장 여부
  save_images: true

chunking:
  # 청킹용 토크나이저 기본값(hybrid 경로 등). tokenizer_path 가 실제 존재하면 그 경로,
  # 없으면 tokenizer_id(HF) 로 폴백 (외부 네트워크 차단 환경 대비)
  tokenizer_path: "/models/doc_parser_models/sentence-transformers-all-MiniLM-L6-v2"
  tokenizer_id: "sentence-transformers/all-MiniLM-L6-v2"

  # pdf/txt/md/ppt 등 일반 텍스트 splitter 기본값
  generic:
    chunk_size: 10000000
    chunk_overlap: 100

  # hwp/hwpx/docx + recursive 분기 기본값
  recursive:
    chunk_size: 8192
    chunk_overlap: 100
    # 임베딩 입력 안정성을 위한 토큰 절대 상한
    token_chunk_size_cap: 60000
    # 비우면 로컬 경로(/models/...) 우선, 없으면 HF ID fallback
    tokenizer_id: ""

  # hwp/hwpx/docx + hybrid 분기 기본값
  hybrid:
    # 토큰 수 계산 방식. "char"(default)=문자 수 기준 | "huggingface"=HF 토크나이저 기준
    tokenizer_type: "char"
    tokenizer_id: ""
    chunk_size: 10000000
    merge_peers: true

# 포맷별 옵션 컨테이너
formats:
  # PPT(ppt/pptx): PDF 변환 → 경량 docling 파싱 → 페이지 기반 청킹(기본 1 page 1 chunk,
  # chunk_size 지정 시 연속 페이지 결합). page_description 으로 "페이지 자체"를 VLM 설명.
  # (첨부용은 dotsocr 미수행 + do_ocr=false 최소 파싱, bbox 미추출)
  ppt:
    # 첨부용은 속도 우선: 병렬도↑, 이미지/출력 축소, 간결 프롬프트.
    page_description:
      # true 면 각 페이지를 렌더링해 VLM 설명(+native text 프롬프트 포함). false 면 파싱만 수행.
      enable: true
      # VLM(chat/completions) 엔드포인트
      url: "https://genos.genon.ai/api/gateway/rep/serving/761/v1/chat/completions"
      api_key: "d6b4609e06104261b7f945819b65256d"
      model: "model"
      timeout: 360
      concurrency: 32          # 페이지 설명 요청 병렬 수(속도↑; VLM 서버 처리량 한도 내)
      images_scale: 1.0        # 페이지 렌더 배율↓(payload·image token↓ → 추론↓)
      max_image_side: 1536     # 전송 전 이미지 최대 변(px) 캡(payload↓). 0=원본
      max_tokens: 512          # VLM 출력 토큰 상한(생성 시간↓). 0=상한 없음
      # 서버가 max_completion_tokens 등 다른 키를 쓰면 params 로 전달:
      # params: { max_completion_tokens: 512 }
      # 프롬프트: 첨부용은 간결(2~3문장) 버전 사용
      prompt_template_file: prompt_page_image_description_fast.md

loaders:
  image:
    # 이미지 OCR 언어
    ocr_languages: ["kor", "eng"]

  tabular:
    # CSV 인코딩 감지 시 샘플링 바이트 수
    encoding_detect_sample_bytes: 10000

# 음성 파일(.wav/.mp3/.m4a) 처리 기본값
whisper:
  url: "http://192.168.74.164:30100/v1/audio/transcriptions"
  model: "model"
  language: "ko"
  response_format: "json"
  temperature: "0"
  stream: "false"
  timestamp_granularities: "word"
  chunk_sec: 29
  chunk_overlap_ms: 300
  # 끝에 / 를 주면 디렉터리로 간주해 내부에 파일명 기준 하위 폴더 생성
  tmp_dir_prefix: "./tmp_audios_"
