interfaces = []
exclude = [
  "**/__pycache__",
  ".github",
  ".venv",
  "docs",
  "tests",
]
root_module = "ignore"
source_roots = ["."]
# Layers (highest first). Unlayered modules form the implicit "core" that
# everything is allowed to depend on; they carry the cyclic backend<->datamodel
# and utils<->stages deps that block further layering without a code refactor.
layers = [
  "orchestration",
  "pipeline",
]

