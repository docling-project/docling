name: "Build and publish packages"

on:
  release:
    types: [published]

env:
  UV_FROZEN: "1"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    environment:
      name: pypi
      url: https://pypi.org/p/docling
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    steps:
      - uses: actions/checkout@v6
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Build packages
        run: bash .github/scripts/build-packages.sh
      - name: Publish docling-slim to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          packages-dir: dist/
          skip-existing: false
      - name: Wait for docling-slim to be available on PyPI
        run: |
          echo "Waiting 60 seconds for docling-slim to be available on PyPI..."
          sleep 60
      - name: Publish docling to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          packages-dir: dist/
          skip-existing: false
