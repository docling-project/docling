name: "Run Docs CD"

on:
  push:
    branches:
      - "main"

jobs:
  build-deploy-docs:
    uses: ./.github/workflows/docs.yml
    with:
      deploy: true
    permissions:
      # Required by actions/deploy-pages — the official GitHub Pages
      # deployment action. Reusable workflows inherit permissions from the
      # caller, so they must be declared here, not inside docs.yml.
      contents: read
      pages: write
      id-token: write
