name: "Mention Comment Notify to Slack"

on:
  issue_comment:
    types: [created]

jobs:
  mention-comment-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Mentions in Comment
        id: parse-comment
        uses: actions/github-script@v6
        with:
          script: |
            // 'core', 'github', 'context'лҠ” github-script м•Ўм…ҳм—җм„ң мһҗлҸҷмңјлЎң мЈјмһ…лҗЁ.

            // 1) GitHub SecretsлЎңл¶Җн„° л©ҳм…ҳ л§Өн•‘(JSON) мқҪкё°
            const userMapJson = process.env.GENOS_MAP_JSON || "{}";
            const userMap = JSON.parse(userMapJson);

            // 2) лҙҮ мҪ”л©ҳнҠё л¬ҙмӢң (coderabbitai[bot] л“ұ GitHub bot кі„м •)
            const commentUser = context.payload.comment?.user?.login || "";
            const commentUserType = context.payload.comment?.user?.type || "";
            if (commentUserType === "Bot") {
              console.log("Skipping bot comment from:", commentUser);
              core.setOutput("shouldSend", "false");
              return;
            }

            // 3) мқҙмҠҲ мҪ”л©ҳнҠё ліёл¬ё
            const commentBody = context.payload.comment?.body || "";
            const mentionRegex = /@([a-zA-Z0-9-_]+)/g;
            let transformed = commentBody;
            let hasMention = false;
            let match;

            console.log("commentBody =", commentBody);
            console.log("userMap =", userMap);
            // 3) GitHub л©ҳм…ҳ вҶ’ Slack л©ҳм…ҳ м№ҳнҷҳ
            while ((match = mentionRegex.exec(commentBody)) !== null) {
              console.log("Found mention:", match[1]);
              const ghId = match[1];     // @ л’Өмқҳ GitHub ID

              // Skip copilot mentions as they are for AI instructions, not human notifications
              if (ghId.toLowerCase() === "copilot") {
                console.log("Skipping copilot mention");
                continue;
              }

              // Explicitly set hasMention only for valid (non-copilot) mentions
              hasMention = true;
              if (userMap[ghId]) {
                // Slack мң м Җ IDлЎң м№ҳнҷҳ (ex: @лӘ…лҢҖмҡ° -> <@UABC12345>)
                transformed = transformed.replace(`@${ghId}`, `<@${userMap[ghId]}>`);
              }
            }

            // л©ҳм…ҳмқҙ м „нҳҖ м—Ҷмңјл©ҙ Slack ліҙлӮј н•„мҡ” X
            if (!hasMention) {
              core.setOutput("shouldSend", "false");
              return;
            }

            // 4) Slackм—җ н‘ңмӢңн•  м •ліҙ
            const issueUrl = context.payload.issue?.html_url || "";
            const issueNumber = context.payload.issue?.number || "";
            const issueTitle = context.payload.issue?.title || "";

            // 5) Slack Blocks кө¬мЎ°лҘј JavaScript к°қмІҙлЎң мғқм„ұ
            const blocks = [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": `*мқҙмҠҲ лҢ“кёҖм—җ л©ҳм…ҳмқҙ л°ңмғқн–ҲмҠөлӢҲлӢӨ!* \n\n` +
                          `мқҙмҠҲ: <${issueUrl}|#${issueNumber} - ${issueTitle}> \n` +
                          `*мҪ”л©ҳнҠё лӮҙмҡ©:* ${transformed}`
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": `By: ${commentUser}`
                  }
                ]
              }
            ];

            // 6) Slackм—җ ліҙлӮј мөңмў… Payload
            const payloadObj = {
              blocks: blocks
            };

            // 7) JSON л¬ёмһҗм—ҙлЎң ліҖнҷҳ + GitHub Actions outputм—җ м ҖмһҘ
            core.setOutput("shouldSend", "true");
            core.setOutput("payload", JSON.stringify(payloadObj));
        env:
          GENOS_MAP_JSON: ${{ secrets.GENOS_MAP_JSON }}

      - name: Send Slack Notification
        if: steps.parse-comment.outputs.shouldSend == 'true'
        uses: slackapi/slack-github-action@v1.23.0
        with:
          # л°”лЎң мң„ лӢЁкі„м—җм„ң л§Ңл“  payload к·ёлҢҖлЎң мӮ¬мҡ©
          payload: ${{ steps.parse-comment.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
